name: Kriterion Daily FX Signal

on:
  schedule:
    # Esegue all'1:00 UTC
    # I giorni passano da 1-5 a 2-6 (Martedì-Sabato)
    - cron: '0 1 * * 2-6'
  workflow_dispatch:

jobs:
  run-signal:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install pandas numpy requests plotly eodhd python-dotenv streamlit
        
    - name: Run Daily Bot
      env:
        EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python daily_bot_runner.py
